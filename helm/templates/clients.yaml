# ==============================================================================
# data-connect-trino client
# ==============================================================================

{{- $dctSecretObj := (lookup "v1" "Secret" .Release.Namespace "data-connect-trino-client-credentials") | default dict }}
{{- if or (empty $dctSecretObj)
          (and
            (hasKey $dctSecretObj.metadata "annotations")
            (hasKey $dctSecretObj.metadata.annotations "meta.helm.sh/release-name")
            (eq (get $dctSecretObj.metadata.annotations "meta.helm.sh/release-name") .Release.Name))
}}
apiVersion: v1
kind: Secret
metadata:
  name: data-connect-trino-client-credentials
  labels:
    app: data-connect-trino
    type: app_wallet-client-credential
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $dctSecretData := (get $dctSecretObj "data") | default dict }}
  {{- $dctClientSecret := (get $dctSecretData "clientSecret") | default (randBytes 32 | b64dec | printf "%x" | b64enc) }}
  clientId: {{ b64enc "data-connect-trino" | quote }}
  clientSecret: {{ $dctClientSecret | quote }}
{{- end }}

---
apiVersion: dnastack.com/v1
kind: WalletClient
metadata:
  name: data-connect-trino
  labels:
    app: data-connect-trino
spec:
  syncMode: CREATE_AND_UPDATE
  clientSecrets:
    - credentialId: default
      syncMode: CREATE_ONLY
      secretKeyRef:
        name: data-connect-trino-client-credentials
        key: clientSecret
  data:
    id: data-connect-trino
    name: "OAuth Client representing data-connect-trino"
    grants:
      # Grant: trino
      - audience: '{{- include "dnastack.trino.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "full_access"
      # Grant: indexing-service
      - audience: '{{- include "dnastack.indexingService.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "ins:library:read"
      # Grant: collection-service
      - audience: '{{- include "dnastack.collectionService.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "collection_item:read"

---
# ==============================================================================
# data-connect-trino-e2e-test client
# ==============================================================================

{{- $e2eSecretObj := (lookup "v1" "Secret" .Release.Namespace "data-connect-trino-e2e-test-client-credentials") | default dict }}
{{- if or (empty $e2eSecretObj)
          (and
            (hasKey $e2eSecretObj.metadata "annotations")
            (hasKey $e2eSecretObj.metadata.annotations "meta.helm.sh/release-name")
            (eq (get $e2eSecretObj.metadata.annotations "meta.helm.sh/release-name") .Release.Name))
}}
apiVersion: v1
kind: Secret
metadata:
  name: data-connect-trino-e2e-test-client-credentials
  labels:
    app: data-connect-trino
    type: test_wallet-client-credential
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $e2eSecretData := (get $e2eSecretObj "data") | default dict }}
  {{- $e2eClientSecret := (get $e2eSecretData "clientSecret") | default (randBytes 32 | b64dec | printf "%x" | b64enc) }}
  clientId: {{ b64enc "data-connect-trino-e2e-test" | quote }}
  clientSecret: {{ $e2eClientSecret | quote }}
{{- end }}

---
apiVersion: dnastack.com/v1
kind: WalletClient
metadata:
  name: data-connect-trino-e2e-test
  labels:
    app: data-connect-trino
spec:
  syncMode: CREATE_AND_UPDATE
  clientSecrets:
    - credentialId: default
      syncMode: CREATE_ONLY
      secretKeyRef:
        name: data-connect-trino-e2e-test-client-credentials
        key: clientSecret
  data:
    id: data-connect-trino-e2e-test
    name: "Client for end-to-end testing of data-connect-trino"
    grants:
      # Grant: data-connect-trino
      - audience: '{{- include "dnastack.dataConnectTrino.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "data-connect:info"
          - name: "data-connect:data"
          - name: "data-connect:query"
          - name: "junk_scope"
      # Grant: publisher-data
      - audience: '{{- include "dnastack.publisherData.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "data-connect:info"
          - name: "data-connect:data"
          - name: "data-connect:query"
      # Grant: indexing-service
      - audience: '{{- include "dnastack.indexingService.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "ins:library:read"
          - name: "ins:library:write"
      # Grant: trino
      - audience: '{{- include "dnastack.trino.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "full_access"
