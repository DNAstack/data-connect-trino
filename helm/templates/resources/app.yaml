# ==============================================================================
# data-connect-trino client
# ==============================================================================

{{- $dctSecretObj := (lookup "v1" "Secret" .Release.Namespace "data-connect-trino-client-credentials") | default dict }}
{{- if or (empty $dctSecretObj)
          (and
            (hasKey $dctSecretObj.metadata "annotations")
            (hasKey $dctSecretObj.metadata.annotations "meta.helm.sh/release-name")
            (eq (get $dctSecretObj.metadata.annotations "meta.helm.sh/release-name") .Release.Name))
}}
apiVersion: v1
kind: Secret
metadata:
  name: data-connect-trino-client-credentials
  labels:
    app: data-connect-trino
    type: app_wallet-client-credential
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
data:
  {{- $dctSecretData := (get $dctSecretObj "data") | default dict }}
  {{- $dctClientSecret := (get $dctSecretData "clientSecret") | default (randBytes 32 | b64dec | printf "%x" | b64enc) }}
  clientId: {{ b64enc "data-connect-trino" | quote }}
  clientSecret: {{ $dctClientSecret | quote }}
{{- end }}

---
apiVersion: dnastack.com/v1
kind: WalletClient
metadata:
  name: data-connect-trino
  labels:
    app: data-connect-trino
spec:
  syncMode: CREATE_AND_UPDATE
  clientSecrets:
    - credentialId: default
      syncMode: CREATE_ONLY
      secretKeyRef:
        name: data-connect-trino-client-credentials
        key: clientSecret
  data:
    id: data-connect-trino
    name: "OAuth Client representing data-connect-trino"
    grants:
      # Grant: trino
      - audience: '{{- include "dnastack.trino.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "full_access"
      # Grant: indexing-service
      - audience: '{{- include "dnastack.indexingService.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "ins:library:read"
      # Grant: collection-service
      - audience: '{{- include "dnastack.collectionService.resourceUrl" . }}'
        grantTypes:
          - client_credentials
        responseTypes:
          - token
        scopes:
          - name: "collection_item:read"

---
# ==============================================================================
# data-connect-trino-access-policy (syncMode: CREATE_AND_UPDATE)
# ==============================================================================
apiVersion: dnastack.com/v1
kind: WalletPolicy
metadata:
  name: data-connect-trino-access-policy
  labels:
    app: data-connect-trino
spec:
  syncMode: CREATE_AND_UPDATE
  data:
    id: data-connect-trino-access-policy
    name: Access Policy for Data Connect Trino
    statements:
      - principals:
          - type: service
            id: data-connect-trino-e2e-test
        actions:
          - data-connect:info
          - data-connect:data
          - data-connect:query
        resources:
          - uri: "{{- include "dnastack.dataConnectTrino.resourceUrl" . }}"
          - uri: "{{- include "dnastack.dataConnectTrino.resourceUrl" . }}/"
          - uri: "{{- include "dnastack.publisherData.resourceUrl" . }}/data-connect/table/publisher"
          - uri: "{{- include "dnastack.publisherData.resourceUrl" . }}/data-connect/table/publisher/public"
          - uri: "{{- include "dnastack.publisherData.resourceUrl" . }}/data-connect/table/publisher/public/library"
      - principals:
          - type: service
            id: data-connect-trino-e2e-test
        actions:
          - ins:library:read
          - ins:library:write
        resources:
          - uri: "{{- include "dnastack.indexingService.resourceUrl" . }}/library/"
      - principals:
          - type: service
            id: data-connect-trino
        actions:
          - ins:library:read
        resources:
          - uri: "{{- include "dnastack.indexingService.resourceUrl" . }}/library/"
      - principals:
          - type: service
            id: data-connect-trino
        actions:
          - collection_item:read
        resources:
          - uri: "{{- include "dnastack.collectionService.resourceUrl" . }}/collection/"
