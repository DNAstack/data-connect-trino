# One-time migration hook: adopts existing cloud-init-created secrets into helm management.
# Safe to remove after all environments have been upgraded once.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-adopt-secrets
  labels:
    app: data-connect-trino
  annotations:
    helm.sh/hook: pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: data-connect-trino
    spec:
      serviceAccountName: dataconnecttrinoservice
      restartPolicy: Never
      containers:
        - name: adopt-secrets
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              for secret in data-connect-trino-client-credentials data-connect-trino-e2e-test-client-credentials; do
                if kubectl get secret "$secret" -n {{ .Release.Namespace }} 2>/dev/null; then
                  echo "Adopting secret $secret into helm management"
                  kubectl annotate secret "$secret" -n {{ .Release.Namespace }} \
                    meta.helm.sh/release-name={{ .Release.Name }} \
                    meta.helm.sh/release-namespace={{ .Release.Namespace }} \
                    --overwrite
                  kubectl label secret "$secret" -n {{ .Release.Namespace }} \
                    app.kubernetes.io/managed-by=Helm \
                    --overwrite
                else
                  echo "Secret $secret does not exist yet, skipping"
                fi
              done
              echo "Secret adoption complete"
